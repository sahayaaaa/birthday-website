<head>
  
    <style>
        body {
    background: linear-gradient(
        to bottom,
        #0f172a,
        #172554,
        #1e293b
    );
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 50px;
}

.card {
    max-width: 700px;
    margin: auto;
    background: rgba(255,255,255,0.08);
    padding: 30px;
    border-radius: 28px;
    border: 1px solid rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
}

h1 {
    font-size: 3rem;
}

p {
    font-size: 1.2rem;
}

.next-btn {
    margin-top: 20px;
    padding: 12px 28px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    font-size: 16px;
    background: #f8c8dc;
    color: #1e293b;
    transition: all 0.3s ease;
}

.next-btn:hover {
    transform: translateY(-2px);
}

#reason-card {
    margin-top: 120px;
    backdrop-filter: blur(10px);
}
    </style>
</head>

<body>

    <div class="card">
        <h1>🎂 Happy 19th Birthday

        <p>
    Welcome to a little corner of the internet made just for you.
        </p>

        <p>
            Thank you for being such an important part of my life.
        </p>
  
    </div>

</button>
</div>

let current = -1;

function nextReason() {

    // 🌸 REASONS MODE
    if (stage === "reasons") {

        current++;

        if (current < reasons.length) {

            document.getElementById("reason-title").innerText =
                "💌 Reason " + (current + 1) + " of 19";

            document.getElementById("reason-text").innerText =
                reasons[current];
        }

        // 🎯 switch to songs after 19
        if (current === reasons.length - 1) {
            setTimeout(() => {
                stage = "songs";
                showSong();
            }, 800);
        }
    }

    // 🎵 SONG MODE
    else if (stage === "songs") {
        songIndex++;
        showSong();
    }
}
