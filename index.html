<!DOCTYPE html>
<html>
<head>
    <h1>🎂 Happy Birthday ❤️</h1>

    <style>
        body {
            background-color: #0f172a;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
        }

        .card {
            max-width: 700px;
            margin: auto;
            background: rgba(255,255,255,0.1);
            padding: 25px;
            border-radius: 20px;
        }

        h1 {
            font-size: 3rem;
        }

        p {
            font-size: 1.2rem;
        }
    </style>
</head>

<body>

    <div class="card">
        <h1>🎂 Happy 19th Birthday 
                  THRIBHUVAN❤️</h1>

        <p>
    Welcome to a little corner of the internet made just for you.
        </p>

        <p>
            Thank you for being such an important part of my life.
        </p>
  
    </div>
    <div id="reason-card" class="card">
    <h2>💌 A Little Note For You</h2>

    <p id="reason-text">
        Click the button below. I have 19 reasons to tell you. ❤️
    </p>

    <button onclick="nextReason()">
        Next ❤️
    </button>
</div>

<script>
const reasons = [
    "You're cute in a way that always makes me smile.",
    "You're one of the kindest people I've ever met."
];

let current = -1;

function nextReason() {
    current++;

    if (current < reasons.length) {
        document.getElementById("reason-text").innerText = reasons[current];
    }
}
</script>
</body>
</html>
