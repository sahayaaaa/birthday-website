<!DOCTYPE html>
<html>
<head>
    <h1>🎂 Happy Birthday ❤️</h1>

    <style>
        
       .next-btn {
    margin-top: 20px;
    padding: 12px 28px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    font-size: 16px;
    background: #f8c8dc;
    color: #1e293b;
    transition: all 0.3s ease;
}

.next-btn:hover {
    transform: translateY(-2px);
}

#reason-card {
    margin-top: 120px;
    backdrop-filter: blur(10px);
}
    </style>
</head>

<body>

    <div class="card">
        <h1>🎂 Happy 19th Birthday 
                  THRIBHUVAN❤️</h1>

        <p>
    Welcome to a little corner of the internet made just for you.
        </p>

        <p>
            Thank you for being such an important part of my life.
        </p>
  
    </div>
    <div id="reason-card" class="card" style="margin-top: 80px;">
    <h2 id="reason-title">💌 A Little Note For You</h2>

    <p id="reason-text">
        Here's the 19 reasons i like about you ❤️
    </p>

    <button class="next-btn" onclick="nextReason()">
    Next ❤️
</button>
</div>

<script>
const reasons = [
    "You're cute in a way that always makes me smile.",
    "You're one of the kindest people I've ever met.",
    "You never leave people on seen because you genuinely care.",
    "I love how much you love and respect your mom.",
    "The way you talk is adorable.",
    "Your voice can instantly make my day better.",
    "I melt every time you sing.",
    "I still think about the first time we met and how nervous we both were.",
    "You make me feel loved even through a screen.",
    "You're always there when I need you.",
    "I love your silly tone when you talk.",
    "Your meme references never fail to make me laugh.",
    "You always know how to comfort me.",
    "You're patient with me.",
    "You never judge me.",
    "You have such a gentle heart.",
    "Being with you feels safe.",
    "You're the biggest green flag I've ever met.",
    "Out of all the reasons, my favorite one is simply that you're my cutieee ❤️"
];

let current = -1;

function nextReason() {
    current++;

    if (current < reasons.length) {

        document.getElementById("reason-title").innerText =
            "💌 Reason " + (current + 1) + " of 19";

        document.getElementById("reason-text").innerText =
            reasons[current];
    }

    if (current === reasons.length - 1) {
        document.getElementById("reason-card").style.transform =
            "scale(1.05)";
    }
}
</script>
</body>
</html>
