<!DOCTYPE html>

<head>

    <style>
        body {
            background: linear-gradient(

            );
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
        }

        .card {
            max-width: 700px;
            margin: auto;
            background: rgba(255,255,255,0.08);
            padding: 30px;
            border-radius: 28px;
            border: 1px solid rgba(255,255,255,0.15);
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
        }

        h1 {
            font-size: 3rem;
        }

        p {
            font-size: 1.2rem;
        }

        .next-btn {
            margin-top: 20px;
            padding: 12px 28px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 16px;
            background: #f8c8dc;
            color: #1e293b;
            transition: all 0.3s ease;
        }

        .next-btn:hover {
            transform: translateY(-2px);
        }

        #reason-card {
            margin-top: 120px;
        }
    </style>
</head>

<body>

    <!-- 💌 Intro -->
    <div class="card">

        <p>Welcome to a little corner of the internet made just for you.</p>
        <p>Thank you for being such an important part of my life.</p>
    </div>

    <!-- 💌 Reason + Song Card -->
    <div id="reason-card" class="card">
        <h2 id="reason-title">💌 A Little Note For You</h2>

        <p id="reason-text">
            Click Next ❤️ to start your journey
        </p>

        <button class="next-btn" onclick="nextReason()">
            Next ❤️
        </button>
    </div>
    <div id="song-card" class="card" style="display:none; margin-top: 80px;">
    <h2 id="song-title">🎵 Songs That Remind Me Of You</h2>

    <p id="song-text">
        Click Next Song ❤️ to start
    </p>

    <button class="next-btn" onclick="nextSong()">
        Next Song ❤️
    </button>
</div>

    <script>
        let current = -1;

            }
        ];

        function nextReason() {

            if (stage === "reasons") {

                current++;

                if (current < reasons.length) {

                    document.getElementById("reason-title").innerText =
                        "💌 Reason " + (current + 1) + " of 19";

                    document.getElementById("reason-text").innerText =
                        reasons[current];
                }

                if (current === reasons.length - 1) {
                    setTimeout(() => {
                        document.getElementById("song-card").style.display = "block";
                    }, 800);
                }
            }

            else if (stage === "songs") {
                songIndex++;
                showSong();
            }
        }

        function showSong() {

            if (songIndex < songs.length) {

                document.getElementById("reason-title").innerText =
                    songs[songIndex].title;

                document.getElementById("reason-text").innerText =
                    songs[songIndex].text;
            }

            else {
                document.getElementById("reason-title").innerText =
                    "💙 That's it, Thrii...";

                document.getElementById("reason-text").innerText =
                    "Now onto something else I made for you...";

        }

</html>
