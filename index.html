<!DOCTYPE html>
<html>
<head>
    <title>Happy Birthday Thrii ❤️</title>

    <style>
        body {
            background: linear-gradient(to bottom, #0f172a, #172554, #1e293b);
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
        }

        .card {
            max-width: 700px;
            margin: auto;
            background: rgba(255,255,255,0.08);
            padding: 30px;
            border-radius: 28px;
            border: 1px solid rgba(255,255,255,0.15);
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
            margin-top: 40px;
        }

        h1 {
            font-size: 3rem;
        }

        p {
            font-size: 1.2rem;
        }

        .next-btn {
            margin-top: 20px;
            padding: 12px 28px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 16px;
            background: #f8c8dc;
            color: #1e293b;
            transition: 0.3s;
        }

        .next-btn:hover {
            transform: translateY(-2px);
        }
    </style>
</head>

<body>

    <!-- 💙 Intro -->
    <div class="card">
        <h1>🎂 Happy 19th Birthday THRIBHUVAN ❤️</h1>
        <p>Welcome to a little corner of the internet made just for you.</p>
        <p>Thank you for being such an important part of my life.</p>
    </div>

    <!-- 💌 Main Card -->
    <div class="card">
        <h2 id="title">💌 A Little Note For You</h2>
        <p id="text">19 reasons of why i like you</p>
        <button class="next-btn" onclick="next()">Next ❤️</button>
    </div>

    <!-- 🎵 SONG CARD (hidden initially) -->
    <div id="song-card" class="card" style="display:none;">
        <h2 id="song-title">🎵 Songs That Remind Me Of You</h2>
        <p id="song-text">Click Next Song ❤️</p>
        <button class="next-btn" onclick="nextSong()">Next Song ❤️</button>
    </div>

    <script>
        // 💌 REASONS
        let index = -1;

        const reasons = [
            "You're cute in a way that always makes me smile.",
            "You're one of the kindest people I've ever met.",
            "You never leave people on seen because you genuinely care.",
            "I love how much you love and respect your mom.",
            "The way you talk is adorable.",
            "Your voice can instantly make my day better.",
            "I melt every time you sing.",
            "I feel comfortable with you.",
            "You make me feel loved even through a screen.",
            "You're always there when I need you.",
            "I love your silly tone when you talk.",
            "Your meme references never fail to make me laugh.",
            "You always know how to comfort me.",
            "You're patient with me.",
            "You never judge me.",
            "You have such a gentle heart.",
            "Being with you feels safe.",
            "You're the biggest green flag I've ever met.",
            "Out of all the reasons, my favorite one is simply that you're my cutieee ❤️"
        ];

        // 🎵 SONGS
        let songIndex = -1;

        const songs = [
            {
                title: "🎵 Golden Brown",
                text: "Because it's your vibe. Anyone who knows you would think of you when they hear it."
            },
            {
                title: "🎵 Can't Help Falling in Love",
                text: "This reminds me of your confession and that moment."
            },
            {
                title: "🎵 Naan Un",
                text: "It just feels like us and our memories."
            }
        ];

        let stage = "reasons";

        function next() {

            if (stage === "reasons") {

                index++;

                if (index < reasons.length) {
                    document.getElementById("title").innerText =
                        "💌 Reason " + (index + 1) + " of 19";

                    document.getElementById("text").innerText =
                        reasons[index];
                }

                if (index === reasons.length - 1) {
                    setTimeout(() => {
                        stage = "songs";
                        document.getElementById("song-card").style.display = "block";
                    }, 800);
                }
            }
        }

        function nextSong() {

            songIndex++;

            if (songIndex < songs.length) {

                document.getElementById("song-title").innerText =
                    songs[songIndex].title;

                document.getElementById("song-text").innerText =
                    songs[songIndex].text;
            }

            else {
                document.getElementById("song-title").innerText =
                    "💙 That's it, Thrii...";

                document.getElementById("song-text").innerText =
                    "Now onto something else I made for you...";
            }
        }
    </script>

</body>
</html>
